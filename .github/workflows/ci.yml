name: ML-Forge CI Build Verification Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Install System Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    # This single step mirrors exactly how you run it locally
    - name: Execute Build and Test Automation Pipeline
      run: |
        chmod +x run.sh
        ./run.sh
